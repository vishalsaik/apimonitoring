services:
  postgres:
    image: postgres:15-alpine
    container_name: api-monitoring-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: apimonitoring
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-postgres.sql:/docker-entrypoint-initdb.d/init-postgres.sql
    networks:
      - api-monitoring-network
    restart: 
      unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d apimonitoring"]
      interval: 10s
      timeout: 5s
      retries: 5
  mongo:
   image: mongo:6.0
   container_name: api-monitoring-mongo
   ports:
     -  "27017:27017"
   volumes:  
   - mongo_data:/data/db
   networks:
    - api-monitoring-network
   restart:
    unless-stopped 
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: api-monitoring-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: api_user
      RABBITMQ_DEFAULT_PASS: api_password
      RABBITMQ_DEFAULT_VHOST: api_vhost
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - api-monitoring-network
    restart:
      unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "rabbitmqctl -q status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
  server:
    image: stevenemo/api-monitoring-server:0.3
    container_name: api-monitoring-server
    ports:
      - "5000:5000"
    environment:
      APP_ENV: development
      APP_PORT: 5000
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: apimonitoring
      MONGO_URL: mongodb://mongo:27017
      MONGO_DB: apimonitoring
      RABBITMQ_URL: amqp://api_user:api_password@rabbitmq:5672/api_vhost
      RABBITMQ_QUEUE_NAME: api_hits
      RABBITMQ_PUBLISH_CONFIRMATION: "true"
      RABBITMQ_RETRY_COUNT: "3"
      RABBITMQ_RETRY_DELAY: "500"
      JWT_SECRET_KEY: your-local-dev-secret-key
      JWT_EXPIRATION_TIME: "3600"
      RATE_LIMIT_WINDOW_MS: "60000"
      RATE_LIMIT_MAX_REQUESTS: "100"
      PASSWORD_MIN_LENGTH: "8"
      PASSWORD_REQUIRE_UPPERCASE: "true"
      PASSWORD_REQUIRE_LOWERCASE: "true"
      PASSWORD_REQUIRE_NUMBER: "true"
      PASSWORD_REQUIRE_SPECIAL: "true"
      COOKIE_MAX_AGE: "3600"
      COOKIE_HTTP_ONLY: "true"
      COOKIE_SECURE: "false"
      ALLOWED_ORIGIN: "http://localhost:3000"
      
    networks:
      - api-monitoring-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  pgadmin:
    image: dpage/pgadmin4:7
    container_name: api-monitoring-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - api-monitoring-network
    restart:
      unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
volumes:
  postgres_data:
   driver: local
  mongo_data:
   driver: local  
  rabbitmq_data:
   driver: local
  pgadmin_data:
   driver: local
networks:
  api-monitoring-network:
    driver: bridge